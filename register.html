<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            
        }
        html{
            height: 100%;
        }
        
        body{
            background: url("1.jpg");

        }
        .rg_layout{
            width: 900px;
            height: 500px;
            border: 5px solid #EEEEEE;
            background-color: white;
            margin:0 auto;
            margin-top:100px;
            border-radius: 4px;
            
        }
        .rg_left{
            float: left;
            margin: 15px;
            width: 20%;
            color: #FFD026;
            font-size: 20px;
            margin-top: 30px;
        }
        
        .rg_center{
            float: left;
            width: 450px;
            margin-top: 30px;
        }
        .rg_right{
            float: right;
            margin: 15px;
            margin-top: 30px;
        }
        .rg_right > p:first-child{
            font-size: 15px;
        }
        .rg_right p a {
            color:rgb(22, 161, 108);
        }
        .td_left{
            width: 100px;
            text-align: right;
            height: 45px;
        }
        .td_right{
            padding-left: 50px;
        }
        #username,#password,#email,#name,#tel,#birthday{
            width: 251px;
            height: 32px;
            border: 1px solid #A6A6A6;
            border-radius: 5px;
            padding-left: 10px ;
        }
        
        #reg-sub{
            width: 150px;
            height: 40px;
            background-color: #FFD026;
            border: 1px solid #FFD026;
            font-size: larger;
            text-transform: uppercase;
            border-radius: 4px;
        }
    </style>
    <script type="text/javascript">
        function regsub() 
        {   
            alert("create a new account!")
            window.open("Login.html")
        }

        
        
    </script>
</head>
<body>
    <div class="rg_layout">
        <div class="rg_left">
            <p>USER REGISTER</p>
        </div>
        <div class="rg_center">
            <div class="rg_form">
                <form action="#">
                    <table>
                        <tr>
                            <td class="td_left"><label for="username">USERNAME</label></td>
                            <td class="td_right"><input type="text" name="username" id="username" placeholder="Please enter username"></td>
                        </tr>
                        <tr>
                            <td class="td_left"><label for="password">PASSWORD</label></td>
                            <td class="td_right"><input type="password" name="password" id="password" placeholder="Please enter password"></td>
                        </tr>
                        <tr>
                            <td class="td_left"><label for="email">EMAIL</label></td>
                            <td class="td_right"><input type="email" name="email" id="email" placeholder="Please enter email"></td>
                        </tr>
                        <tr>
                            <td class="td_left"><label for="name">NAME</label></td>
                            <td class="td_right"><input type="text" name="name" id="name" placeholder="Please enter real name"></td>
                        </tr>
                        <tr>
                            <td class="td_left"><label for="tel">PHONE</label></td>
                            <td class="td_right"><input type="text" name="tel" id="tel" placeholder="Please enter telephone number"></td>
                        </tr>
                        <tr>
                            <td class="td_left"><label>GENDER</label></td>
                            <td class="td_right"><input type="radio" name="gender" value="male">MALE
                                <input type="radio" name="gender" value="female">FEMALE</td>
                        </tr>
                        <tr>
                            <td class="td_left"><label>REGISTER AS</label></td>
                            <td class="td_right"><input type="radio" name="gender" value="male">STAFF
                                <input type="radio" name="gender" value="female">STUDENT</td>
                        </tr>
                        <tr>
                            <td class="td_left"><label for="birthday">BIRTHDAY</label></td>
                            <td class="td_right"><input type="date" name="birthday" id="birthday"></td>
                        </tr>
                        <tr/>
                        <tr>
                            <td colspan="2" align="center"><input type="submit" id="reg-sub" value="register" onclick="regsub()"></td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
        <div class="rg_right">
            <p>Already have an account?<a href="Login.html">Log in now</a></p>
        </div>

    </div>

</body>
